<!DOCTYPE html>
<html lang="en" data-theme="">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="MentorAI — AI Chat with File Upload & Voice Input">
  <title>MentorAI</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>">
</head>
<body>

<div class="atm" aria-hidden="true"></div>
<div id="sbBackdrop" class="sb-backdrop"></div>

<div class="chat-layout">

  <!-- ══════════ SIDEBAR ══════════ -->
  <nav id="sidebar" class="sidebar" aria-label="Chat navigation">

    <div class="sb-brand">
      <div class="sb-icon" aria-hidden="true">🧠</div>
      <span class="sb-name">MentorAI</span>
    </div>

    <button class="btn btn-primary" id="newChatBtn"
      style="border-radius:var(--r-md);padding:11px 14px;width:100%;justify-content:flex-start;gap:9px;">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      New Chat
    </button>

    <div class="sb-section">History</div>

    <div class="conv-list" id="convList" role="list"></div>

    <!-- Usage meter -->
    <div class="usage-wrap" id="usageWrap">
      <div class="usage-row">
        <span class="usage-lbl">Daily Usage</span>
        <span class="usage-cnt" id="usageCnt">0 / 20</span>
      </div>
      <div class="usage-track">
        <div class="usage-fill" id="usageFill" style="width:0%"></div>
      </div>
    </div>

    <!-- User card -->
    <a href="settings.html" class="sb-user" aria-label="Account settings">
      <div class="av" id="sbAv" aria-hidden="true">U</div>
      <div class="sb-user-meta">
        <div class="sb-user-name" id="sbName">Loading…</div>
        <div class="sb-user-plan">
          <span class="badge badge-free" id="sbBadge">Free</span>
        </div>
      </div>
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--text-4)" stroke-width="2" aria-hidden="true">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
      </svg>
    </a>

  </nav>

  <!-- ══════════ MAIN ══════════ -->
  <main class="chat-main" role="main">

    <!-- Header -->
    <header class="chat-hdr">
      <div class="hdr-l">
        <button class="menu-btn" id="menuBtn" aria-label="Toggle sidebar">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>

        <div style="display:flex;align-items:center;gap:7px;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--text-3)" stroke-width="2" aria-hidden="true">
            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
          </svg>
          <select class="model-sel" id="modelSel" aria-label="Select AI model">
            <!-- Populated by JS -->
          </select>
        </div>
      </div>

      <div class="hdr-r">
        <a href="settings.html" class="icon-btn" title="Settings" aria-label="Settings">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
          </svg>
        </a>

        <button class="icon-btn" id="logoutBtn" title="Log out" aria-label="Log out">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Messages -->
    <div class="msg-scroll" id="msgScroll" role="log" aria-live="polite" aria-label="Chat messages">

      <!-- Welcome state -->
      <div class="welcome" id="welcomeState">
        <div class="w-icon" aria-hidden="true">🧠</div>
        <h1 class="w-title">What can I help with?</h1>
        <p class="w-sub">Ask anything, upload a file, or speak — your AI mentor is ready.</p>
        <div class="prompt-grid" role="list">
          <button class="p-chip">Explain quantum computing simply</button>
          <button class="p-chip">Write a Python REST API endpoint</button>
          <button class="p-chip">Summarize the uploaded document</button>
          <button class="p-chip">Debug this error in my code</button>
          <button class="p-chip">Create a 30-day ML roadmap</button>
          <button class="p-chip">Write a professional cold email</button>
          <button class="p-chip">Explain SOLID principles with examples</button>
          <button class="p-chip">What's in this image?</button>
        </div>
      </div>

      <div class="msg-inner" id="msgInner"></div>
    </div>

    <!-- ══ INPUT ZONE ══ -->
    <div class="input-zone" role="form" aria-label="Message composer">

      <!-- Attachment chips -->
      <div class="attach-chips" id="attachChips" style="display:none;" aria-label="Attachments"></div>

      <!-- Main input row -->
      <div class="input-row">

        <!-- PLUS BUTTON (left side) -->
        <div class="plus-wrap">
          <button class="plus-btn" id="plusBtn" aria-label="Add attachment" title="Attach file or image" aria-haspopup="true" aria-expanded="false">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
              <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
          </button>

          <!-- Attach menu -->
          <div class="attach-menu" id="attachMenu" role="menu" aria-label="Attachment options">

            <!-- Add TXT File -->
            <button class="attach-option" id="optTxt" role="menuitem">
              <div class="attach-opt-icon txt-icon">📄</div>
              <div class="attach-opt-label">
                <span class="attach-opt-name">Add Text File</span>
                <span class="attach-opt-hint">.txt files up to 2MB</span>
              </div>
            </button>

            <!-- Add Photo -->
            <button class="attach-option" id="optImg" role="menuitem">
              <div class="attach-opt-icon img-icon">🖼️</div>
              <div class="attach-opt-label">
                <span class="attach-opt-name">Add Photo</span>
                <span class="attach-opt-hint">JPG, PNG, GIF, WebP up to 8MB</span>
              </div>
            </button>

          </div>

          <!-- Hidden inputs -->
          <input type="file" id="fileTxt" accept=".txt,text/plain" aria-hidden="true">
          <input type="file" id="fileImg" accept="image/jpeg,image/png,image/gif,image/webp,image/bmp" aria-hidden="true">
        </div>

        <!-- TEXT INPUT -->
        <textarea
          id="chatInput"
          class="chat-ta"
          placeholder="Message MentorAI… (Enter ↵ sends · Shift+Enter new line)"
          rows="1"
          maxlength="10000"
          aria-label="Type your message"
          autocomplete="off"
          spellcheck="true"
        ></textarea>

        <!-- MIC BUTTON (left of send) -->
        <button class="mic-btn" id="micBtn" aria-label="Voice input" title="Click to speak">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/>
            <path d="M19 10v2a7 7 0 01-14 0v-2"/>
            <line x1="12" y1="19" x2="12" y2="23"/>
            <line x1="8" y1="23" x2="16" y2="23"/>
          </svg>
        </button>

        <!-- SEND BUTTON (far right) -->
        <button class="send-btn" id="sendBtn" aria-label="Send message" title="Send">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>

      <!-- Input meta row -->
      <div class="input-meta">
        <span>MentorAI can make mistakes. Always verify important information.</span>
        <div class="input-meta-right">
          <!-- Mic listening status -->
          <div class="mic-status" id="micStatus">
            <span class="mic-dot"></span>
            <span>Listening…</span>
          </div>
          <!-- Stop streaming button -->
          <span id="stopWrap" style="display:none;">
            <button id="stopBtn" class="btn btn-ghost btn-sm" style="gap:5px;font-size:0.70rem;">
              <svg width="9" height="9" viewBox="0 0 24 24" fill="currentColor"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>
              Stop generating
            </button>
          </span>
        </div>
      </div>
    </div>

  </main>
</div>

<div id="toast-root"></div>

<script type="module" src="chat.js"></script>
</body>
</html>
