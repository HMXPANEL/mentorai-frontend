<!DOCTYPE html>
<html lang="en" data-theme="">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MentorAI — Create Account</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>">
</head>
<body>
<div class="atm" aria-hidden="true"></div>

<div class="auth-wrap">
  <div class="glass-hi auth-card fade-up" role="main">

    <div class="auth-brand">
      <div class="brand-mark" aria-hidden="true">🧠</div>
      <div class="brand-name">MentorAI</div>
      <div class="brand-tagline">Create your free account in seconds</div>
    </div>

    <form class="auth-form" id="signupForm" novalidate>

      <div class="fg">
        <label class="flabel" for="name">Full Name</label>
        <input type="text" id="name" class="finput" placeholder="Jane Smith" autocomplete="name" required>
      </div>

      <div class="fg">
        <label class="flabel" for="email">Email Address</label>
        <input type="email" id="email" class="finput" placeholder="you@example.com" autocomplete="email" inputmode="email" required>
      </div>

      <div class="fg">
        <label class="flabel" for="password">Password</label>
        <div class="pw-wrap">
          <input type="password" id="password" class="finput" placeholder="At least 8 characters" autocomplete="new-password" minlength="8" required style="padding-right:44px;">
          <button type="button" id="togglePw" class="pw-eye" aria-label="Toggle password visibility">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <div id="strengthWrap" style="display:none;">
          <div class="pw-strength-bar"><div id="strengthFill" class="pw-strength-fill"></div></div>
          <div id="strengthText" class="pw-strength-text"></div>
        </div>
      </div>

      <div class="err-box" id="errBox" role="alert">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0;margin-top:1px"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span id="errTxt"></span>
      </div>

      <div style="font-size:0.70rem;color:var(--text-3);text-align:center;line-height:1.5;">
        By signing up, you agree to our <a href="#" style="color:var(--a2);text-decoration:none;">Terms</a> &amp; <a href="#" style="color:var(--a2);text-decoration:none;">Privacy Policy</a>.
      </div>

      <button type="submit" class="btn btn-primary btn-full btn-lg" id="signupBtn">Create Free Account</button>

      <div class="divider">or</div>

      <button type="button" class="btn-google" id="googleBtn">
        <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Continue with Google
      </button>

      <div class="auth-switch">Already have an account? <a href="login.html">Sign in →</a></div>

    </form>
  </div>
</div>

<div id="toast-root"></div>

<script type="module">
import { signupEmail, loginGoogle, redirectIfLoggedIn } from "./auth.js";

document.addEventListener("DOMContentLoaded", () => {
  redirectIfLoggedIn();

  const form     = document.getElementById("signupForm");
  const nameEl   = document.getElementById("name");
  const emailEl  = document.getElementById("email");
  const passEl   = document.getElementById("password");
  const btn      = document.getElementById("signupBtn");
  const googleBtn= document.getElementById("googleBtn");
  const errBox   = document.getElementById("errBox");
  const errTxt   = document.getElementById("errTxt");
  const togglePw = document.getElementById("togglePw");

  const showErr = m => { errTxt.textContent = m; errBox.classList.add("show"); };
  const clearErr= () => errBox.classList.remove("show");
  [nameEl, emailEl, passEl].forEach(el => el.addEventListener("input", clearErr));

  togglePw.addEventListener("click", () => { passEl.type = passEl.type === "password" ? "text" : "password"; });

  passEl.addEventListener("input", () => {
    const wrap = document.getElementById("strengthWrap");
    const fill = document.getElementById("strengthFill");
    const text = document.getElementById("strengthText");
    const pw = passEl.value;
    if (!pw) { wrap.style.display = "none"; return; }
    wrap.style.display = "block";
    let s = 0;
    if (pw.length >= 8)  s++;
    if (pw.length >= 12) s++;
    if (/[A-Z]/.test(pw)) s++;
    if (/[0-9]/.test(pw)) s++;
    if (/[^A-Za-z0-9]/.test(pw)) s++;
    const L = [["20%","#ef4444","Very weak"],["40%","#f97316","Weak"],["60%","#f59e0b","Fair"],["80%","#22c55e","Strong"],["100%","#10b981","Very strong"]];
    const l = L[Math.min(s,4)];
    fill.style.width = l[0]; fill.style.background = l[1];
    text.textContent = l[2]; text.style.color = l[1];
  });

  const ERRORS = {
    "auth/email-already-in-use":"An account with this email already exists.",
    "auth/weak-password":       "Password is too weak. Use at least 8 characters.",
    "auth/invalid-email":       "Please enter a valid email address.",
    "auth/network-request-failed":"Network error. Check your connection."
  };

  async function doSignup(e) {
    if (e) e.preventDefault();
    clearErr();
    const name  = nameEl.value.trim();
    const email = emailEl.value.trim();
    const pass  = passEl.value;
    if (!name)           { showErr("Enter your full name."); nameEl.focus();  return; }
    if (!email)          { showErr("Enter your email address."); emailEl.focus(); return; }
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showErr("Enter a valid email."); return; }
    if (pass.length < 8) { showErr("Password must be at least 8 characters."); passEl.focus(); return; }

    btn.disabled = true;
    btn.innerHTML = `<span class="spinner" style="width:15px;height:15px;border-width:2px;"></span> Creating account…`;
    try { await signupEmail(email, pass, name); window.location.href = "index.html"; }
    catch (e) {
      showErr(ERRORS[e.code] || e.message || "Signup failed.");
      btn.disabled = false; btn.textContent = "Create Free Account";
    }
  }

  form.addEventListener("submit", doSignup);

  googleBtn.addEventListener("click", async () => {
    clearErr(); googleBtn.disabled = true;
    try { await loginGoogle(); window.location.href = "index.html"; }
    catch (e) { showErr(e.message || "Google signup failed."); googleBtn.disabled = false; }
  });
});
</script>
</body>
</html>
