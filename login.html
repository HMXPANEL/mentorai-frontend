<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MentorAI — Sign In</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>">
</head>
<body>
<div class="atm" aria-hidden="true"></div>

<div class="auth-wrap">
  <div class="glass-hi auth-card fade-up" role="main">

    <div class="auth-brand">
      <div class="brand-mark" aria-hidden="true">🧠</div>
      <div class="brand-name">MentorAI</div>
      <div class="brand-tagline">Your AI mentor — sign in to continue</div>
    </div>

    <form class="auth-form" id="loginForm" novalidate>

      <div class="fg">
        <label class="flabel" for="email">Email address</label>
        <!-- Added aria-describedby for accessibility -->
        <input type="email" id="email" class="finput" placeholder="you@example.com" autocomplete="email" inputmode="email" required aria-describedby="errBox">
      </div>

      <div class="fg">
        <label class="flabel" for="password">Password</label>
        <div class="pw-wrap">
          <!-- Moved inline style to class 'pw-input' -->
          <input type="password" id="password" class="finput pw-input" placeholder="••••••••" autocomplete="current-password" required aria-describedby="errBox">
          <button type="button" id="togglePw" class="pw-eye" aria-label="Toggle password visibility">
            <svg id="eyeIcon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="err-box" id="errBox" role="alert">
        <!-- Moved inline style to class 'err-icon' -->
        <svg class="err-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <span id="errTxt"></span>
      </div>

      <button type="submit" class="btn btn-primary btn-full btn-lg" id="loginBtn">Sign In</button>

      <div class="divider">or continue with</div>

      <button type="button" class="btn-google" id="googleBtn">
        <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Continue with Google
      </button>

      <div class="auth-switch">Don't have an account? <a href="signup.html">Create one free →</a></div>

      <div style="text-align:center;">
        <!-- Moved inline style to class 'btn-demo' -->
        <button type="button" id="demoBtn" class="btn btn-ghost btn-sm btn-demo">
          ⚡ Enter Demo Mode (no account needed)
        </button>
      </div>

    </form>
  </div>
</div>

<div id="toast-root"></div>

<script type="module">
import { loginEmail, loginGoogle, redirectIfLoggedIn } from "./auth.js";

// Changed to async to handle redirect race condition properly
document.addEventListener("DOMContentLoaded", async () => {
  
  // Await the redirect check to prevent UI flash
  await redirectIfLoggedIn();

  const form      = document.getElementById("loginForm");
  const emailEl   = document.getElementById("email");
  const passEl    = document.getElementById("password");
  const loginBtn  = document.getElementById("loginBtn");
  const googleBtn = document.getElementById("googleBtn");
  const demoBtn   = document.getElementById("demoBtn");
  const errBox    = document.getElementById("errBox");
  const errTxt    = document.getElementById("errTxt");
  const togglePw  = document.getElementById("togglePw");
  const eyeIcon   = document.getElementById("eyeIcon");

  const showErr = msg => { errTxt.textContent = msg; errBox.classList.add("show"); };
  const clearErr= ()  => errBox.classList.remove("show");
  
  [emailEl, passEl].forEach(el => el.addEventListener("input", clearErr));

  togglePw.addEventListener("click", () => {
    const show = passEl.type === "password";
    passEl.type = show ? "text" : "password";
    eyeIcon.innerHTML = show
      ? `<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>`
      : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
  });

  const ERRORS = {
    "auth/wrong-password":         "Incorrect password.",
    "auth/user-not-found":         "No account found with this email.",
    "auth/invalid-credential":     "Invalid email or password.",
    "auth/user-disabled":          "This account has been disabled.",
    "auth/too-many-requests":      "Too many attempts. Try again later.",
    "auth/network-request-failed": "Network error. Check your connection."
  };

  async function doLogin(e) {
    if (e) e.preventDefault();
    clearErr();
    const email = emailEl.value.trim();
    const pass  = passEl.value;
    
    if (!email) { showErr("Enter your email address."); emailEl.focus(); return; }
    if (!pass)  { showErr("Enter your password."); passEl.focus(); return; }
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showErr("Enter a valid email."); return; }

    loginBtn.disabled = true;
    // Replaced inline style with class 'spinner-sm'
    loginBtn.innerHTML = `<span class="spinner spinner-sm"></span> Signing in…`;
    
    try {
      await loginEmail(email, pass);
      window.location.href = "index.html";
    } catch (e) {
      showErr(ERRORS[e.code] || e.message || "Login failed. Try again.");
      loginBtn.disabled = false; 
      loginBtn.textContent = "Sign In"; // Standardized reset
    }
  }

  form.addEventListener("submit", doLogin);
  passEl.addEventListener("keydown", e => { if (e.key === "Enter") doLogin(e); });

  googleBtn.addEventListener("click", async () => {
    clearErr(); 
    googleBtn.disabled = true;
    // Replaced inline style with class 'spinner-sm'
    googleBtn.innerHTML = `<span class="spinner spinner-sm"></span> Connecting…`;
    
    try { 
      await loginGoogle(); 
      window.location.href = "index.html"; 
    } catch (e) {
      showErr(e.message || "Google login failed.");
      googleBtn.disabled = false;
      // Restore original HTML content exactly
      googleBtn.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg> Continue with Google`;
    }
  });

  demoBtn.addEventListener("click", () => {
    /* 
       Security Note: Ensure backend validation treats 'demo-001' 
       as a read-only/guest user and never trusts localStorage 
       for sensitive operations or plan upgrades. 
    */
    localStorage.setItem("m_user", JSON.stringify({ uid:"demo-001", email:"demo@mentorai.app", displayName:"Demo User", photoURL:"" }));
    localStorage.setItem("m_profile", JSON.stringify({ name:"Demo User", username:"demouser", email:"demo@mentorai.app", photoURL:"", plan:"free", theme:"dark", tone:"helpful", customInstructions:"", nickname:"", occupation:"", about:"", memoryEnabled:true, chatHistoryEnabled:true, dailyMessageCount:0, lastResetDate:new Date().toISOString().split("T")[0] }));
    window.location.href = "index.html";
  });
});
</script>
</body>
</html>
